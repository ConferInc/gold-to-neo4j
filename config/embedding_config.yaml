# Config for embedding generation (initial setup + ongoing)
# Used by GraphSAGE training and semantic embedding workers

graph_sage:
  # Graph projection for training
  graph_name: customer_recipe_graph
  node_labels:
    - B2C_Customer
    - Recipe
    - Product
    - Ingredient
    - Cuisine
    - Household
    - Allergens
    - Dietary_Preferences
    - B2C_Customer_Health_Profiles
    - B2C_Customer_Health_Conditions
  relationship_types:
    - HAS_PROFILE
    - HAS_CONDITION
    - IS_ALLERGIC
    - FOLLOWS_DIET
    - VIEWED
    - SAVED
    - BELONGS_TO_CUSINE
  # Numeric properties to use as GraphSAGE features (must exist on all projected nodes).
  # For heterogeneous labels, use dummyFeature so every projected node has a numeric input.
  feature_properties:
    - dummyFeature
  # Fallback if nodes lack numeric features - will add dummyFeature = 1.0
  use_dummy_feature_fallback: true
  model_name: b2c_customer_model
  embedding_dimension: 128
  write_property: graphSageEmbedding

semantic:
  # Per-label text assembly: which properties to concatenate for embedding
  label_text_rules:
    Recipe:
      properties: [title, description, difficulty, instructions]
      separator: " "
    Ingredient:
      properties: [name, category]
      separator: " "
    Product:
      properties: [name, brand, status]
      separator: " "
    B2C_Customer:
      properties: [email, full_name, gender]
      separator: " "
    Cuisine:
      properties: [code]
      separator: " "
  write_property: semanticEmbedding

vector_indexes:
  semantic:
    - label: Recipe
      property: semanticEmbedding
      dimensions: 1536
    - label: Ingredient
      property: semanticEmbedding
      dimensions: 1536
    - label: Product
      property: semanticEmbedding
      dimensions: 1536
    - label: B2C_Customer
      property: semanticEmbedding
      dimensions: 1536
    - label: Cuisine
      property: semanticEmbedding
      dimensions: 1536
  structural:
    - label: B2C_Customer
      property: graphSageEmbedding
      dimensions: 128
    - label: Recipe
      property: graphSageEmbedding
      dimensions: 128
    - label: Product
      property: graphSageEmbedding
      dimensions: 128
    - label: Ingredient
      property: graphSageEmbedding
      dimensions: 128
    - label: Cuisine
      property: graphSageEmbedding
      dimensions: 128
    - label: Household
      property: graphSageEmbedding
      dimensions: 128
    - label: Allergens
      property: graphSageEmbedding
      dimensions: 128
    - label: Dietary_Preferences
      property: graphSageEmbedding
      dimensions: 128
    - label: B2C_Customer_Health_Profiles
      property: graphSageEmbedding
      dimensions: 128
    - label: B2C_Customer_Health_Conditions
      property: graphSageEmbedding
      dimensions: 128
