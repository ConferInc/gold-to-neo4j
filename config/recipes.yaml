sync:
  mode: incremental
  state_file: recipes_state.json
  page_size: 1000
  retries: 3
  retry_backoff_seconds: 1.5
  timeout_seconds: 30

schema: gold

tables:
  recipes:
    label: Recipe
    primary_key: id
    schema_contract:
      skip_validation: true
    updated_at: updated_at
    columns:
      - id
      - title
      - description
      - meal_type
      - difficulty
      - cuisine_id
      - prep_time_minutes
      - cook_time_minutes
      - total_time_minutes
      - servings
      - image_url
      - source_url
      - instructions
      - percent_calories_protein
      - percent_calories_fat
      - percent_calories_carbs
      - created_at
      - updated_at
    enrich:
      cuisine_code:
        from_table: cuisines
        source_key: id
        lookup_key: cuisine_id
        value_field: code

  cuisines:
    label: Cuisine
    primary_key: id
    schema_contract:
      skip_validation: true
    updated_at: created_at
    columns:
      - id
      - code
      - name
      - region
      - country
      - parent_cuisine_id
      - description
      - created_at

  recipe_ingredients:
    skip_upsert: true
    primary_key: id
    schema_contract:
      skip_validation: true
    updated_at: created_at
    alias_map:
      created_at: created_at
    columns:
      - id
      - recipe_id
      - ingredient_id
      - created_at

  ingredients:
    skip_upsert: true
    label: Ingredient
    primary_key: id
    schema_contract:
      skip_validation: true
    updated_at: updated_at
    columns:
      - id

  # Same table as ingredients layer; filter entity_type=recipe for Recipe nutrition
  nutrition_facts:
    skip_upsert: false
    label: NutritionValue
    primary_key: id
    schema_contract:
      skip_validation: true
    updated_at: updated_at
    columns:
      - id
      - nutrient_id
      - entity_id
      - entity_type
      - amount
      - unit
      - per_amount
      - per_amount_grams
      - data_source
      - confidence_score
      - measurement_date
      - created_at
      - updated_at
    filters:
      entity_type: recipe

  # Reference only — loaded by ingredients layer; needed for OF_NUTRIENT relationship
  nutrition_definitions:
    skip_upsert: true
    label: NutrientDefinition
    primary_key: id
    schema_contract:
      skip_validation: true
    columns:
      - id

relationships:
  - name: recipe_has_ingredient
    type: USES_INGREDIENT
    source_table: recipes
    target_table: ingredients
    join_table: recipe_ingredients
    join_source_key: recipe_id
    join_target_key: ingredient_id
    updated_at: created_at

  - name: recipe_belongs_to_cuisine
    type: BELONGS_TO_CUSINE
    source_table: recipes
    target_table: cuisines
    join_table: recipes
    join_source_key: id
    join_target_key: cuisine_id
    updated_at: updated_at

  # entity_id in nutrition_facts = recipe id when entity_type=recipe
  - name: recipe_has_nutrition
    type: HAS_NUTRITION
    source_table: recipes
    target_table: nutrition_facts
    join_table: nutrition_facts
    join_source_key: entity_id
    join_target_key: id
    updated_at: updated_at

  # NutritionValue (recipe) → NutrientDefinition; nutrient_id in nutrition_facts = id in nutrition_definitions
  - name: nutrition_value_of_nutrient
    type: OF_NUTRIENT
    source_table: nutrition_facts
    target_table: nutrition_definitions
    join_table: nutrition_facts
    join_source_key: id
    join_target_key: nutrient_id
    updated_at: updated_at
