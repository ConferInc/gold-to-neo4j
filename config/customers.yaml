      - b2c_customer_id
      - household_id
      - product_id
      - barcode
      - barcode_format
      - scan_source
      - scanned_at

  meal_plans:
    label: MealPlan
    primary_key: id
    schema_contract:
      skip_validation: true
    updated_at: updated_at
    columns:
      - id
      - household_id
      - b2c_customer_id
      - b2b_customer_id
      - plan_name
      - start_date
      - end_date
      - total_estimated_cost
      - total_calories
      - status
      - created_at
      - updated_at
      - meals_per_day
      - ai_model
      - budget_amount
      - budget_currency
      - member_ids
      - generation_time_ms

  meal_plan_items:
    label: MealPlanItem
    primary_key: id
    schema_contract:
      skip_validation: true
    updated_at: created_at
    columns:
      - id
      - meal_plan_id
      - recipe_id
      - meal_date
      - meal_type
      - servings
      - for_member_ids
      - estimated_cost
      - calories_per_serving
      - status
      - rating
      - notes
      - created_at
      - original_recipe_id
      - swap_reason
      - swap_count

  household_budgets:
    label: HouseholdBudget
    primary_key: id
    schema_contract:
      skip_validation: true
    updated_at: updated_at
    columns:
