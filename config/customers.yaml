sync:
  mode: incremental
  state_file: customers_state.json
  page_size: 1000
  retries: 3
  retry_backoff_seconds: 1.5
  timeout_seconds: 30

schema: gold

tables:
  b2c_customers:
    label: B2C_Customer
    primary_key: id
    schema_contract:
      skip_validation: true
    updated_at: updated_at
    columns:
      - id
      - household_id
      - email
      - full_name
      - first_name
      - last_name
      - birth_month
      - birth_year
      - date_of_birth
      - age
      - gender
      - phone
      - is_profile_owner
      - account_status
      - created_at
      - updated_at
      - appwrite_user_id

  b2c_customer_health_conditions:
    label: B2C_Customer_Health_Conditions
    primary_key: id
    schema_contract:
      skip_validation: true
    updated_at: created_at
    safety_critical: true
    columns:
      - id
      - b2c_customer_id
      - condition_id
      - severity
      - diagnosis_date
      - notes
      - is_active
      - created_at

  b2c_customer_health_profiles:
