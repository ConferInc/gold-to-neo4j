      - household_type
      - total_members
      - location_country
      - location_region
      - location_city
      - location_postal_code
      - created_at

  b2c_customer_allergens:
    skip_upsert: true
    primary_key: id
    schema_contract:
      skip_validation: true
    safety_critical: true
