      - b2c_customer_id
      - household_id
      - log_date
      - total_calories
      - total_protein_g
      - total_carbs_g
      - total_fat_g
      - total_fiber_g
      - total_sugar_g
      - total_sodium_mg
      - water_ml
      - water_goal_ml
      - calorie_goal
      - goal_met
      - streak_count
      - notes
      - created_at
      - updated_at

  meal_log_items:
    label: MealLogItem
    primary_key: id
    schema_contract:
      skip_validation: true
    updated_at: logged_at
    columns:
      - id
      - meal_log_id
      - meal_type
      - recipe_id
      - product_id
      - custom_name
      - custom_brand
      - servings
      - serving_size
      - serving_size_g
      - calories
      - protein_g
      - carbs_g
      - fat_g
      - fiber_g
      - sugar_g
      - sodium_mg
      - saturated_fat_g
      - cooked_via_app
      - cooking_started_at
      - cooking_finished_at
      - meal_plan_item_id
      - logged_at
      - source
      - notes
      - image_url

  scan_history:
    label: ScanEvent
    primary_key: id
    schema_contract:
      skip_validation: true
    updated_at: scanned_at
    columns:
