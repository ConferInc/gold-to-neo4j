      - household_id
      - budget_type
      - amount
      - currency
      - period
      - start_date
      - end_date
      - is_active
      - created_at
      - updated_at

  meal_log_streaks:
    label: MealLogStreak
    primary_key: id
    schema_contract:
      skip_validation: true
    updated_at: updated_at
    columns:
      - id
      - b2c_customer_id
      - current_streak
      - longest_streak
      - last_logged_date
      - total_days_logged
      - updated_at

  b2b_customers:
    label: B2BCustomer
    primary_key: id
    schema_contract:
      skip_validation: true
    updated_at: updated_at
    columns:
      - id
      - vendor_id
      - external_id
      - global_customer_id
      - email
      - full_name
      - first_name
      - last_name
      - date_of_birth
      - age
      - gender
      - phone
      - location_country
      - location_region
      - location_city
      - location_postal_code
      - account_status
      - created_at
      - updated_at


  b2b_customer_health_profiles:
    label: B2BHealthProfile
    primary_key: id
    schema_contract:
      skip_validation: true
    updated_at: updated_at
    columns:
      - id
      - b2b_customer_id
      - height_cm
      - weight_kg
      - bmi
      - bmr
      - tdee
      - activity_level
      - health_goal
      - target_weight_kg
      - target_calories
      - target_protein_g
      - target_carbs_g
      - target_fiber_g
      - target_sodium_mg
      - target_sugar_g
      - created_at
      - updated_at

  # Reference only — loaded by products layer; needed for B2BCustomer->Vendor relationship
  vendors:
    skip_upsert: true
    label: Vendor
    primary_key: id
    schema_contract:
      skip_validation: true
    columns:
      - id

  # Reference only — loaded by recipes layer; needed for Cuisine preferences relationship
  cuisines:
    skip_upsert: true
    label: Cuisine
    primary_key: id
    schema_contract:
      skip_validation: true
    columns:
      - id

  # ══════════════════════════════════════════════════════
  # NEW TABLE ENTRIES — Full outbox trigger coverage
  # ══════════════════════════════════════════════════════

  # ── Node Tables ──────────────────────────────────────

  b2c_customer_settings:
    label: CustomerSettings
    primary_key: id
    schema_contract:
      skip_validation: true
    updated_at: updated_at
    columns:
      - id
      - b2c_customer_id
      - units
      - time_range_min
      - time_range_max
      - exploration
      - health_weight
      - time_weight
      - popularity_weight
      - personal_weight
      - diversity_weight
      - default_sort
      - show_score_badge
      - enable_reminders
      - filter_calories_min
      - filter_calories_max
      - filter_protein_min
      - filter_carbs_min
      - filter_fat_min
      - filter_fiber_min
      - filter_sugar_max
      - filter_sodium_max
      - filter_max_time
      - created_at
      - updated_at

  b2c_customer_weight_history:
    label: WeightEntry
    primary_key: id
    schema_contract:
      skip_validation: true
    updated_at: recorded_at
    columns:
      - id
      - b2c_customer_id
      - weight_kg
      - recorded_at
      - source
      - notes
      - created_at

  recipe_ratings:
    label: RecipeRating
    primary_key: id
    schema_contract:
      skip_validation: true
    updated_at: created_at
    columns:
      - id
      - recipe_id
      - b2c_customer_id
      - household_id
      - rating
      - feedback_text
      - liked_aspects
      - disliked_aspects
      - would_make_again
      - meal_plan_item_id
      - created_at

  shopping_lists:
    label: ShoppingList
    primary_key: id
    schema_contract:
      skip_validation: true
    updated_at: updated_at
    columns:
      - id
      - household_id
      - b2c_customer_id
      - b2b_customer_id
      - meal_plan_id
      - list_name
      - vendor_id
      - total_estimated_cost
      - status
      - created_at
      - updated_at

  shopping_list_items:
    label: ShoppingListItem
    primary_key: id
    schema_contract:
      skip_validation: true
    updated_at: updated_at
    columns:
      - id
      - shopping_list_id
      - product_id
      - ingredient_id
      - item_name
      - quantity
      - unit
      - category
      - estimated_price
      - actual_price
      - is_purchased
      - substituted_product_id
      - notes
      - created_at
      - updated_at

  household_preferences:
    label: HouseholdPreference
    primary_key: id
    schema_contract:
      skip_validation: true
    updated_at: created_at
    columns:
      - id
      - household_id
      - preference_type
      - preference_value
      - priority
      - created_at

  chat_sessions:
    label: ChatSession
    primary_key: id
    schema_contract:
      skip_validation: true
    updated_at: last_activity_at
    columns:
      - id
      - b2c_customer_id
      - message_count
      - last_intent
      - created_at
      - last_activity_at
      - expires_at
      # session_data excluded — unbounded JSONB chat blob, no GraphRAG value

  # ── Join Tables (skip_upsert: true) ──────────────────

  b2c_customer_cuisine_preferences:
    skip_upsert: true
    primary_key: b2c_customer_id  # composite PK (b2c_customer_id, cuisine_id) — no id column
    schema_contract:
      skip_validation: true
    columns:
      - b2c_customer_id
      - cuisine_id

  b2b_customer_allergens:
    skip_upsert: true
    primary_key: id
    schema_contract:
      skip_validation: true
    safety_critical: true
    columns:
      - id
      - b2b_customer_id
      - allergen_id

  b2b_customer_dietary_preferences:
    skip_upsert: true
    primary_key: id
    schema_contract:
      skip_validation: true
    columns:
      - id
      - b2b_customer_id
      - diet_id

  b2b_customer_health_conditions:
    skip_upsert: true
    primary_key: id
    schema_contract:
      skip_validation: true
    columns:
      - id
      - b2b_customer_id
      - condition_id

relationships:
  - name: customer_has_profile
    type: HAS_PROFILE
    source_table: b2c_customers
    target_table: b2c_customer_health_profiles
    join_table: b2c_customer_health_profiles
    join_source_key: b2c_customer_id
    join_target_key: id
    updated_at: updated_at

  - name: customer_has_condition
    type: HAS_CONDITION
    source_table: b2c_customers
    target_table: b2c_customer_health_conditions
    join_table: b2c_customer_health_conditions
    join_source_key: b2c_customer_id
    join_target_key: id
    updated_at: created_at

  - name: customer_is_allergic
    type: IS_ALLERGIC
    source_table: b2c_customers
    target_table: allergens
    join_table: b2c_customer_allergens
    join_source_key: b2c_customer_id
    join_target_key: allergen_id

  - name: customer_follows_diet
    type: FOLLOWS_DIET
    source_table: b2c_customers
    target_table: dietary_preferences
    join_table: b2c_customer_dietary_preferences
    join_source_key: b2c_customer_id
    join_target_key: diet_id

  - name: diet_allows_ingredient
    type: ALLOWED
    source_table: dietary_preferences
    target_table: ingredients
    join_table: diet_ingredient_rules
    join_source_key: diet_id
    join_target_key: ingredient_id
    filters:
      rule_type: allowed

  - name: diet_forbids_ingredient
    type: FORBIDDEN
    source_table: dietary_preferences
    target_table: ingredients
    join_table: diet_ingredient_rules
    join_source_key: diet_id
    join_target_key: ingredient_id
    filters:
      rule_type: forbidden

  - name: ingredient_has_allergen
    type: HAS_ALLERGEN
    source_table: ingredients
    target_table: allergens
    join_table: ingredient_allergens
    join_source_key: ingredient_id
    join_target_key: allergen_id

  - name: b2c_customer_health_condition_has_health_condition
    type: HAS_HEALTH_CONDITION
    source_table: b2c_customer_health_conditions
    target_table: health_conditions
    join_table: b2c_customer_health_conditions
    join_source_key: id
    join_target_key: condition_id

  - name: health_condition_forbids_ingredient
    type: FORBIDDEN
    source_table: health_conditions
    target_table: ingredients
    join_table: health_condition_ingredient_restrictions
    join_source_key: condition_id
    join_target_key: ingredient_id
    filters:
      restriction_type: forbidden

  - name: health_condition_limits_ingredient
    type: LIMITS
    source_table: health_conditions
    target_table: ingredients
    join_table: health_condition_ingredient_restrictions
    join_source_key: condition_id
    join_target_key: ingredient_id
    filters:
      restriction_type: limits

  - name: customer_belongs_to_household
    type: HAS_HOUSEHOLD
    source_table: b2c_customers
    target_table: households
    join_table: b2c_customers
    join_source_key: id
    join_target_key: household_id

  - name: customer_viewed_recipe
    type: VIEWED
    source_table: b2c_customers
    target_table: recipes
    join_table: customer_product_interactions
    join_source_key: b2c_customer_id
    join_target_key: recipe_id
    filters:
      entity_type: recipe
      interaction_type: viewed

  - name: customer_viewed_product
    type: VIEWED
    source_table: b2c_customers
    target_table: products
    join_table: customer_product_interactions
    join_source_key: b2c_customer_id
    join_target_key: product_id
    filters:
      entity_type: product
      interaction_type: viewed

  - name: customer_rated_recipe
    type: RATED
    source_table: b2c_customers
    target_table: recipes
    join_table: customer_product_interactions
    join_source_key: b2c_customer_id
    join_target_key: recipe_id
    filters:
      entity_type: recipe
      interaction_type: rated

  - name: customer_rated_product
    type: RATED
    source_table: b2c_customers
    target_table: products
    join_table: customer_product_interactions
    join_source_key: b2c_customer_id
    join_target_key: product_id
    filters:
      entity_type: product
      interaction_type: rated

  - name: customer_saved_recipe
    type: SAVED
    source_table: b2c_customers
    target_table: recipes
    join_table: customer_product_interactions
    join_source_key: b2c_customer_id
    join_target_key: recipe_id
    filters:
      entity_type: recipe
      interaction_type: saved

  - name: customer_saved_product
    type: SAVED
    source_table: b2c_customers
    target_table: products
    join_table: customer_product_interactions
    join_source_key: b2c_customer_id
    join_target_key: product_id
    filters:
      entity_type: product
      interaction_type: saved

  - name: customer_rejected_recipe
    type: REJECTED
    source_table: b2c_customers
    target_table: recipes
    join_table: customer_product_interactions
    join_source_key: b2c_customer_id
    join_target_key: recipe_id
    filters:
      entity_type: recipe
      interaction_type: rejected

  - name: customer_rejected_product
    type: REJECTED
    source_table: b2c_customers
    target_table: products
    join_table: customer_product_interactions
    join_source_key: b2c_customer_id
    join_target_key: product_id
    filters:
      entity_type: product
      interaction_type: rejected

  - name: customer_whitelisted_recipe
    type: WHITELISTED
    source_table: b2c_customers
    target_table: recipes
    join_table: customer_product_interactions
    join_source_key: b2c_customer_id
    join_target_key: recipe_id
    filters:
      entity_type: recipe
      interaction_type: whitelisted

  - name: customer_whitelisted_product
    type: WHITELISTED
    source_table: b2c_customers
    target_table: products
    join_table: customer_product_interactions
    join_source_key: b2c_customer_id
    join_target_key: product_id
    filters:
      entity_type: product
      interaction_type: whitelisted

  - name: customer_blacklisted_recipe
    type: BLACKLISTED
    source_table: b2c_customers
    target_table: recipes
    join_table: customer_product_interactions
    join_source_key: b2c_customer_id
    join_target_key: recipe_id
    filters:
      entity_type: recipe
      interaction_type: blacklisted

  - name: customer_blacklisted_product
    type: BLACKLISTED
    source_table: b2c_customers
    target_table: products
    join_table: customer_product_interactions
    join_source_key: b2c_customer_id
    join_target_key: product_id
    filters:
      entity_type: product
      interaction_type: blacklisted

  - name: customer_tried_recipe
    type: TRIED
    source_table: b2c_customers
    target_table: recipes
    join_table: customer_product_interactions
    join_source_key: b2c_customer_id
    join_target_key: recipe_id
    filters:
      entity_type: recipe
      interaction_type: tried

  - name: customer_tried_product
    type: TRIED
    source_table: b2c_customers
    target_table: products
    join_table: customer_product_interactions
    join_source_key: b2c_customer_id
    join_target_key: product_id
    filters:
      entity_type: product
      interaction_type: tried

  - name: meal_log_contains_item
    type: CONTAINS_ITEM
    source_table: meal_logs
    target_table: meal_log_items
    join_table: meal_log_items
    join_source_key: meal_log_id
    join_target_key: id
    updated_at: logged_at

  - name: meal_log_item_of_recipe
    type: OF_RECIPE
    source_table: meal_log_items
    target_table: recipes
    join_table: meal_log_items
    join_source_key: id
    join_target_key: recipe_id
    updated_at: logged_at

  - name: meal_plan_contains_item
    type: CONTAINS_ITEM
    source_table: meal_plans
    target_table: meal_plan_items
    join_table: meal_plan_items
    join_source_key: meal_plan_id
    join_target_key: id
    updated_at: updated_at

  - name: meal_plan_item_plans_recipe
    type: PLANS_RECIPE
    source_table: meal_plan_items
    target_table: recipes
    join_table: meal_plan_items
    join_source_key: recipe_id
    join_target_key: id
    updated_at: updated_at

  - name: household_has_budget
    type: HAS_BUDGET
    source_table: households
    target_table: household_budgets
    join_table: household_budgets
    join_source_key: household_id
    join_target_key: id
    updated_at: updated_at

  - name: b2b_customer_has_profile
    type: HAS_PROFILE
    source_table: b2b_customers
    target_table: b2b_customer_health_profiles
    join_table: b2b_customer_health_profiles
    join_source_key: b2b_customer_id
    join_target_key: id
    updated_at: updated_at

  - name: b2b_customer_follows_diet
    type: FOLLOWS_DIET
    source_table: b2b_customers
    target_table: dietary_preferences
    join_table: b2b_customer_dietary_preferences
    join_source_key: b2b_customer_id
    join_target_key: diet_id

  - name: b2b_customer_has_condition
    type: HAS_CONDITION
    source_table: b2b_customers
    target_table: health_conditions
    join_table: b2b_customer_health_conditions
    join_source_key: b2b_customer_id
