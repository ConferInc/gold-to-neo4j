      - weight_kg
      - bmi
      - bmr
      - tdee
      - activity_level
      - health_goal
      - target_weight_kg
      - target_calories
      - target_protein_g
      - target_carbs_g
      - target_fat_g
      - target_fiber_g
      - target_sodium_mg
      - target_sugar_g
      - created_at
      - updated_at
      - intolerances
      - disliked_ingredients
      - onboarding_complete

  allergens:
    label: Allergens
    primary_key: id
    schema_contract:
      skip_validation: true
    updated_at: created_at
    safety_critical: true
    columns:
      - id
      - code
      - name
      - common_names
      - category
      - is_top_9
      - severity_typical
      - description
      - cross_reactive_with
      - regulatory_region
      - created_at

  dietary_preferences:
    label: Dietary_Preferences
    primary_key: id
    schema_contract:
      skip_validation: true
